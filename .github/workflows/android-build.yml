name: Sparks CI — Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  GRADLE_VERSION: '9.3.1'

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # Debug APK — runs on every push and PR
  # ───────────────────────────────────────────────────────────────────────────
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Create debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 10000 \
            -keyalg RSA \
            -keysize 2048

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --no-configuration-cache --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Sparks-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error


  # ───────────────────────────────────────────────────────────────────────────
  # Signed release APK — only on push to main
  # ───────────────────────────────────────────────────────────────────────────
  build-release:
    name: Release APK
    runs-on: ubuntu-latest
    needs: build-debug
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: true


      # ───────────────────────────────────────────────────────────────────────
      # Release keystore
      # Required GitHub Secrets:
      #
      # KEYSTORE_B64
      # STORE_PASSWORD
      # KEY_PASSWORD
      # ───────────────────────────────────────────────────────────────────────

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > my-upload-key.jks


      - name: Verify keystore
        run: |
          keytool -list \
            -keystore my-upload-key.jks \
            -storepass "${{ secrets.STORE_PASSWORD }}"


      - name: Build release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle assembleRelease \
            --no-daemon \
            --no-configuration-cache \
            --stacktrace


      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Sparks-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error
